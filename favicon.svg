<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#2563EB"/>
  <!-- Ascending staircase steps (white) — reads clearly at 16x16 -->
