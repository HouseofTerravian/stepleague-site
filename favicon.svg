  <rect x="10" y="16" width="7" height="4" rx="1" fill="white"/>
  <rect x="15" y="11" width="7" height="4" rx="1" fill="white"/>
  <!-- Green accent dot at peak -->
  <circle cx="22" cy="10" r="2.5" fill="#22C55E"/>
</svg>
